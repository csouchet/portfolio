# 🎨 UI / Components
ui:
  - "src/components/**"
  - "src/layouts/**"
  - "src/pages/**"

component:
  - "src/components/**"

# ✍️ Content & branding
content:
  - "content/**"
  - "data/**"
  - "**/*.md"
  - "**/*.json"

branding:
  - "public/**"
  - "assets/**"

# 📈 SEO / Analytics
seo:
  - "src/seo/**"
  - "public/robots.txt"
  - "public/sitemap.xml"

analytics:
  - "src/lib/analytics/**"

# ⚙️ Tech / Infra
ci-cd:
  - ".github/**"

setup:
  - "config/**"
  - "*.config.*"
  - "tsconfig.json"
  - "next.config.*"

# 📚 Documentation
documentation:
  - "docs/**"
  - "README.md"