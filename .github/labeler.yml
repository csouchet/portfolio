enhancement:
  - head-branch:
      - '^feat/'
  - changed-files:
      - any-glob-to-any-file:
          - 'src**'

bug:
  - head-branch:
      - '^fix/'

refactor:
  - head-branch:
      - '^refactor/'

# 🎨 UI / Components
ui:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/components/**'
          - 'src/layouts/**'
          - 'src/pages/**'

component:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/components/**'

# ✍️ Content & branding
content:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/content/**'
          - 'src/data/**'
          - 'src/**/*.md'
          - 'src/**/*.json'

branding:
  - changed-files:
      - any-glob-to-any-file:
          - 'public/**'
          - 'assets/**'

# 📈 SEO / Analytics
seo:
  - changed-files:
      - any-glob-to-any-file:
          - 'public/robots*'
          - 'public/sitemap*'
          - 'src/**/seo/**'
          - 'src/**/seo*'
          - 'src/**/sitemap*'
          - 'src/**/robots*'

analytics:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/lib/analytics/**'

# ⚙️ Tech / Infra
ci-cd:
  - head-branch:
      - '^ci/'
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**/*'

setup:
  - changed-files:
      - any-glob-to-any-file:
          - 'config/**'
          - '*.config.*'
          - 'tsconfig.json'

# 📚 Documentation
documentation:
  - head-branch:
      - '^docs/'
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'LICENSE'
          - 'docs/**'