changelog:
  exclude:
    labels:
      - dependencies
      - github_actions
      - ignore-for-release-notes
  categories:
    - title: Breaking Changes 💥
      labels:
        - breaking-change

    - title: New Features 🎉
      labels:
        - enhancement

    - title: Bug Fixes 🛠️
      labels:
        - bug

    - title: CI/CD 🚀
      labels:
        - ci-cd

    - title: Project Setup & Tools 🔧
      labels:
        - setup

    - title: UI / UX Improvements 🎨
      labels:
        - ui
        - ux
        - accessibility

    - title: Analytics & SEO 📈
      labels:
        - analytics
        - seo

    - title: Content Updates 📝
      labels:
        - content
        - branding

    - title: Code Refactoring ⚙️
      labels:
        - refactor

    - title: Documentation 📚
      labels:
        - documentation

    - title: Other Changes
      labels:
        - "*"