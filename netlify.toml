[build]
command = "npm run build"
publish = ".next"
ignore = """
  if [ "$CACHED_COMMIT_REF" = "$COMMIT_REF" ]; then \
    exit 1; \
  else \
    if git diff --name-only $CACHED_COMMIT_REF $COMMIT_REF | grep -qvE '^\
      (pr-rules\\.yml|\
      dependabot\\.yml|\
      labeler\\.yml|\
      pull_request_template\\.md|\
      release\\.yml|\
      pre-commit|\
      img/.*|\
      .nvmrc|\
      .prettierrc|\
      .gitignore|\
      .vscode/.*|\
      .github/workflows/.*|\
      .husky/.*|\
      AGENTS\\.md|\
      CLAUDE\\.md|\
      eslint\\.config\\.mjs|\
      LICENSE|\
      README\\.md|\
      tsconfig\\.json)$'; \
    then \
      exit 1; \
    else \
      exit 0; \
    fi; \
  fi \
"""

[[plugins]]
package = "@netlify/plugin-nextjs"
