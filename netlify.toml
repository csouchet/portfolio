[build]
command = "npm run build"
publish = ".next"
ignore = """
  if [ "$CACHED_COMMIT_REF" = "$COMMIT_REF" ]; then exit 0; else \
    git diff --name-only $CACHED_COMMIT_REF $COMMIT_REF | grep -qvE '^\
    (pr-rules\\.yml|\
    dependabot\\.yml|\
    labeler\\.yml|\
    pull_request_template\\.md|\
    release\\.yml|\
    pre-commit|\
    img/.*|\
    .nvmrc|\
    .prettierrc|\
    .gitignore|\
    .vscode/.*|\
    .github/workflows/.*|\
    .husky/.*|\
    AGENTS\\.md|\
    CLAUDE\\.md|\
    eslint\\.config\\.mjs|\
    LICENSE|\
    README\\.md|\
    tsconfig\\.json)$'; \
  fi\
"""

[[plugins]]
package = "@netlify/plugin-nextjs"

[context.production.environment]
NEXT_PUBLIC_SITE_URL = "https://celine-souchet.netlify.app"

[context.deploy-preview.environment]
NEXT_PUBLIC_SITE_URL = "$DEPLOY_PRIME_URL"

[context.branch-deploy.environment]
NEXT_PUBLIC_SITE_URL = "$DEPLOY_PRIME_URL"